name: Weekly Alpha Model Retrain

on:
  schedule:
    # Every Sunday at 11:00 PM IST = 5:30 PM UTC
    - cron: '30 17 * * 0'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  retrain:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: modules/alpha-scorer/requirements.txt

      - name: Install Python dependencies
        run: pip install -r modules/alpha-scorer/requirements.txt

      - name: Retrain alpha model
        run: python3 modules/alpha-scorer/model.py
        # Outputs: modules/alpha-scorer/model.pkl
        #          modules/alpha-scorer/scores.json
        #          modules/alpha-scorer/report.html

      - name: Commit updated model artifacts
        run: |
          git config user.name  "portfolio-bot"
          git config user.email "bot@portfolio"
          git add modules/alpha-scorer/model.pkl \
                  modules/alpha-scorer/scores.json \
                  modules/alpha-scorer/report.html
          git diff --cached --quiet || git commit -m "chore: weekly alpha retrain $(date -u '+%Y-%m-%d')"
          git push

      - name: Trigger HF Space sync (optional)
        if: ${{ vars.HF_SPACE_URL != '' }}
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ vars.HF_SPACE_URL }}/train" \
            -H "Content-Type: application/json" || true
