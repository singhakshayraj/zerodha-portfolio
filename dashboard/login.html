<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Portfolio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d111c;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #151b2e;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    .brand {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }
    .sub {
      font-size: 13px;
      color: #718096;
      margin-bottom: 36px;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      background: #0d111c;
      border: 1px solid #2d3748;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 15px;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.15s;
    }
    input[type="password"]:focus { border-color: #4a9eff; }
    button {
      width: 100%;
      padding: 12px;
      background: #4a9eff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #3a8eef; }
    .error {
      margin-top: 14px;
      font-size: 13px;
      color: #fc8181;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">📈 Portfolio</div>
    <div class="sub">Enter password to continue</div>
    <input type="password" id="pw" placeholder="Password" autofocus/>
    <button onclick="login()">Unlock</button>
    <div class="error" id="err"></div>
  </div>
  <script>
    // Allow pressing Enter
    document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

    function login() {
      const pw = document.getElementById('pw').value;
      if (pw === 'akshay123') {
        localStorage.setItem('pf_auth', '1');
        const next = new URLSearchParams(location.search).get('next') || '/';
        location.href = next;
      } else {
        document.getElementById('err').textContent = 'Incorrect password.';
        document.getElementById('pw').value = '';
        document.getElementById('pw').focus();
      }
    }
  </script>
</body>
</html>
